name: Security Audit (CVE)

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/security-audit.yml"
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "package.json"
      - "package-lock.json"
  schedule:
    # 매일 09:00 KST (00:00 UTC) CVE DB 갱신 반영
    - cron: "0 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies (no scripts)
        run: npm ci --ignore-scripts

      - name: npm audit (high/critical만 빌드 실패)
        run: |
          set +e
          npm audit --audit-level=high --omit=dev
          PROD_STATUS=$?
          echo "### 🔐 npm audit 결과" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npm audit --omit=dev >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### dev 의존성 감사 (정보 제공)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npm audit >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          exit $PROD_STATUS

  # Google OSV.dev 공식 재사용 워크플로 사용
  # SARIF 생성·Code Scanning 업로드를 내부에서 처리한다.
  # 참고: https://google.github.io/osv-scanner/github-action/
  osv-scan:
    name: OSV-Scanner
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.5"
    permissions:
      actions: read
      contents: read
      security-events: write
    with:
      scan-args: |-
        --recursive
        --skip-git
        ./
