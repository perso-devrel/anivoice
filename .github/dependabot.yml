version: 2
updates:
  # npm 의존성 CVE 감시
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 10
    reviewers:
      - "alpaka206"
    assignees:
      - "alpaka206"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(dev-deps)"
      include: "scope"
    groups:
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # eslint-plugin-react-hooks 최신(7.0.1)이 아직 eslint 10을 지원하지 않음
      - dependency-name: "eslint"
        versions: [">=10"]
      - dependency-name: "@eslint/js"
        versions: [">=10"]
      # @vercel/node v5는 transitive undici/tar 등으로 CVE가 증가 (SECURITY-AUDIT.md 참조)
      - dependency-name: "@vercel/node"
        versions: [">=5"]
    labels:
      - "dependencies"
      - "security"

  # GitHub Actions 버전 관리
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    reviewers:
      - "alpaka206"
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "ci"
      - "dependencies"
